<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <!-- Neon glow for CTL text -->
    <filter id="neon" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="18" result="blur1"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="6"  result="blur2"/>
      <feMerge>
        <feMergeNode in="blur1"/>
        <feMergeNode in="blur1"/>
        <feMergeNode in="blur2"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Subtle white glow for car outline -->
    <filter id="carGlow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Dark navy background -->
  <rect width="1024" height="1024" fill="#091525" rx="190"/>

  <!-- ============================
       MINIMALIST FRONT-FACING CAR
       ============================ -->

  <!-- Outer body silhouette — single clean path -->
  <!-- Roof narrows to top, A-pillars flare out to hood, bumper at bottom -->
  <path d="
    M 512 158
    Q 660 162 680 275
    L 790 415
    L 846 540
    Q 854 580 848 618
    L 176 618
    Q 170 580 178 540
    L 234 415
    L 344 275
    Q 364 162 512 158
    Z"
    fill="none"
    stroke="white"
    stroke-width="9"
    stroke-linejoin="round"
    filter="url(#carGlow)"/>

  <!-- Windshield — clean trapezoid outline only -->
  <path d="
    M 390 272
    L 346 400
    L 678 400
    L 634 272
    Z"
    fill="none"
    stroke="white"
    stroke-width="6"
    stroke-linejoin="round"
    opacity="0.55"/>

  <!-- ============================
       CTL — NEON BLUE TEXT
       ============================ -->
  <text
    x="512"
    y="810"
    font-family="'Arial Black', 'Helvetica Neue', Arial, sans-serif"
    font-size="192"
    font-weight="900"
    text-anchor="middle"
    fill="#00CFFF"
    letter-spacing="22"
    filter="url(#neon)">CTL</text>
</svg>

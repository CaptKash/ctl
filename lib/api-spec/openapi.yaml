          description: List of fuel records
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FuelRecord"
    post:
      operationId: createFuelRecord
      tags: [fuel]
      summary: Create fuel record
      parameters:
        - name: carId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateFuelInput"
      responses:
        "201":
          description: Created record
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FuelRecord"

  /cars/{carId}/fuel/{recordId}:
    put:
      operationId: updateFuelRecord
      tags: [fuel]
      summary: Update fuel record
      parameters:
        - name: carId
          in: path
          required: true
          schema:
            type: integer
        - name: recordId
          in: path

        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePartsInput"
      responses:
        "201":
          description: Created record
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PartsRecord"

  /cars/{carId}/parts/{recordId}:
    put:
      operationId: updatePartsRecord
      tags: [parts]
      summary: Update parts record
      parameters:
        - name: carId
          in: path
          required: true
          schema:
            type: integer
        - name: recordId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePartsInput"
      responses:
        "200":
          description: Updated record
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PartsRecord"
    delete:
      operationId: deletePartsRecord
      tags: [parts]
      summary: Delete parts record
      parameters:
        - name: carId
          in: path
          required: true
          schema:
            type: integer
        - name: recordId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /cars/{carId}/insurance:
    get:
      operationId: getInsuranceRecords
      tags: [insurance]
      summary: Get insurance records for a car
      parameters:
        - name: carId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of insurance records
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/InsuranceRecord"
    post:
      operationId: createInsuranceRecord
      tags: [insurance]
      summary: Create insurance record
      parameters:
        - name: carId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateInsuranceInput"
      responses:
        "201":
          description: Created record
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InsuranceRecord"

  /cars/{carId}/insurance/{recordId}:
    put:
      operationId: updateInsuranceRecord
      tags: [insurance]
      summary: Update insurance record
      parameters:
        - name: carId
          in: path
          required: true
          schema:
            type: integer
        - name: recordId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateInsuranceInput"
      responses:
        "200":
          description: Updated record
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InsuranceRecord"
    delete:
      operationId: deleteInsuranceRecord
      tags: [insurance]
      summary: Delete insurance record
      parameters:
        - name: carId
          in: path
          required: true
          schema:
            type: integer
        - name: recordId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /cars/{carId}/dealerships:
    get:
      operationId: getDealershipRecords
      tags: [dealerships]
      summary: Get dealership records for a car
      parameters:
        - name: carId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of dealership records
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DealershipRecord"
    post:
      operationId: createDealershipRecord
      tags: [dealerships]
      summary: Create dealership record
      parameters:
        - name: carId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateDealershipInput"
      responses:
        "201":
          description: Created record
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DealershipRecord"

  /cars/{carId}/dealerships/{recordId}:
    put:
      operationId: updateDealershipRecord
      tags: [dealerships]
      summary: Update dealership record
      parameters:
        - name: carId
          in: path
          required: true
          schema:
            type: integer
        - name: recordId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateDealershipInput"
      responses:
        "200":
          description: Updated record
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DealershipRecord"
    delete:
      operationId: deleteDealershipRecord
      tags: [dealerships]
      summary: Delete dealership record
      parameters:
        - name: carId
          in: path
          required: true
          schema:
            type: integer
        - name: recordId
          in: path

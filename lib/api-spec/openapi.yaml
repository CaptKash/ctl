  /cars/{carId}/report:
    get:
      operationId: getCarReport
      tags: [cars]
      summary: Get full report for a car
      parameters:
        - name: carId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Car report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CarReport"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
      required:
        - success

    Car:
      type: object
      properties:
        id:
          type: integer
        make:
          type: string
        model:
          type: string
        year:
          type: integer
        color:
          type: string
        licensePlate:
          type: string
        vin:
          type: string
        mileage:
          type: integer
        notes:
          type: string
        createdAt:
          type: string
        updatedAt:
          type: string
      required:
        - id
        - make
        - model
        - year
        - createdAt
        - updatedAt

    CreateCarInput:
      type: object
      properties:
        make:
          type: string
        model:
          type: string
        year:
          type: integer
        color:
          type: string
        licensePlate:
          type: string
        vin:
          type: string
        mileage:
          type: integer
        notes:
          type: string
      required:
        - make
        - model
        - year

    MaintenanceRecord:
      type: object
      properties:
        id:
          type: integer
        carId:
          type: integer
        type:
          type: string
        description:
          type: string
        date:
          type: string
        mileage:
          type: integer
        cost:
          type: number
        shop:
          type: string
        notes:
          type: string
        nextDueDate:
          type: string
        nextDueMileage:
          type: integer
        createdAt:
          type: string
      required:
        - id
        - carId
        - type
        - description
        - date
        - createdAt

    CreateMaintenanceInput:
      type: object
      properties:
        type:
          type: string
        description:
          type: string
        date:
          type: string
        mileage:
          type: integer
        cost:
          type: number
        shop:
          type: string
        notes:
          type: string
        nextDueDate:
          type: string
        nextDueMileage:
          type: integer
      required:
        - type
        - description
        - date

    PartsRecord:
      type: object
      properties:
        id:
          type: integer
        carId:
          type: integer
        name:
          type: string
        partNumber:
          type: string
        brand:
          type: string
        category:
          type: string
        cost:
          type: number
        quantity:
          type: integer
        installedDate:
          type: string
        installedMileage:
          type: integer
        supplier:
          type: string
        warranty:
          type: string
        notes:
          type: string
        createdAt:
          type: string
      required:
        - id
        - carId
        - name
        - category
        - createdAt

    CreatePartsInput:
      type: object
      properties:
        name:
          type: string
        partNumber:
          type: string
        brand:
          type: string
        category:
          type: string
        cost:
          type: number
        quantity:
          type: integer
        installedDate:
          type: string
        installedMileage:
          type: integer
        supplier:
          type: string
        warranty:
          type: string
        notes:
          type: string
      required:
        - name
        - category

    InsuranceRecord:
      type: object
      properties:
        id:
          type: integer
        carId:
          type: integer
        provider:
          type: string
        policyNumber:
          type: string
        type:
          type: string
        premium:
          type: number
        premiumFrequency:
          type: string
        startDate:
          type: string
        endDate:
          type: string
        deductible:
          type: number
        coverageLimit:
          type: number
        agentName:
          type: string
        agentPhone:
          type: string
        notes:
          type: string
        createdAt:
          type: string
      required:
        - id
        - carId
        - provider
        - policyNumber
        - type
        - startDate
        - createdAt

    CreateInsuranceInput:
      type: object
      properties:
        provider:
          type: string
        policyNumber:
          type: string
        type:
          type: string
        premium:
          type: number
        premiumFrequency:
          type: string
        startDate:
          type: string
        endDate:
          type: string
        deductible:
          type: number
        coverageLimit:
          type: number
        agentName:
          type: string
        agentPhone:
          type: string
        notes:
          type: string
      required:
        - provider
        - policyNumber
        - type
        - startDate

    DealershipRecord:
      type: object
      properties:
        id:
          type: integer
        carId:
          type: integer
        name:
          type: string
        address:
          type: string
        phone:
          type: string
        email:
          type: string
        contactPerson:
          type: string
        visitDate:
          type: string
        purpose:
          type: string
        cost:
          type: number
        notes:
          type: string
        rating:
          type: integer
        createdAt:
          type: string
      required:
        - id
        - carId
        - name
        - visitDate
        - purpose
        - createdAt

    CreateDealershipInput:
      type: object
      properties:
        name:
          type: string
        address:
          type: string
        phone:
          type: string
        email:
          type: string
        contactPerson:
          type: string
        visitDate:
          type: string
        purpose:
          type: string
        cost:
          type: number
        notes:
          type: string
        rating:
          type: integer
      required:
        - name
        - visitDate
        - purpose

    FuelRecord:
      type: object
      properties:
        id:
          type: integer
        carId:
          type: integer
        date:
          type: string
        mileage:
          type: integer
        liters:
          type: number
        pricePerLiter:
          type: number
        totalCost:
          type: number
        fuelType:
          type: string
        station:
          type: string
        fullTank:
          type: boolean
        notes:
          type: string
        createdAt:
          type: string
      required:
        - id
        - carId
        - date
        - mileage
        - liters
        - totalCost
        - createdAt

    CreateFuelInput:
      type: object
      properties:
        date:
          type: string
        mileage:
          type: integer
        liters:
          type: number
        pricePerLiter:
          type: number
        totalCost:
          type: number
        fuelType:
          type: string
        station:
          type: string
        fullTank:
          type: boolean
        notes:
          type: string
      required:
        - date
        - mileage
        - liters
        - totalCost

    CarReport:
      type: object
      properties:
        car:
          $ref: "#/components/schemas/Car"
        totalMaintenanceCost:
          type: number
        totalPartsCost:
          type: number
        totalInsuranceCost:
          type: number
        totalFuelCost:
          type: number
        totalCost:
          type: number
        maintenanceCount:
          type: integer
        partsCount:
          type: integer
        fuelCount:
          type: integer
        lastMaintenance:
          type: string
          nullable: true
        upcomingMaintenanceDue:
          type: array
          items:
            $ref: "#/components/schemas/MaintenanceRecord"
        recentActivity:
          type: array
          items:
            $ref: "#/components/schemas/ActivityItem"
      required:
        - car
        - totalMaintenanceCost
        - totalPartsCost
        - totalInsuranceCost
        - totalFuelCost
        - totalCost
        - maintenanceCount
        - partsCount
        - fuelCount
        - upcomingMaintenanceDue
        - recentActivity

    ActivityItem:
      type: object
      properties:
        type:
          type: string
        description:
          type: string
        date:
          type: string
        cost:
          type: number
          nullable: true
      required:
        - type
        - description
        - date

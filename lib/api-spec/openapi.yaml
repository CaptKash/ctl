openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Car Logbook API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: cars
    description: Car management
  - name: maintenance
    description: Maintenance records
  - name: parts
    description: Parts records
  - name: insurance
    description: Insurance records
  - name: dealerships
    description: Dealership records
  - name: fuel
    description: Fuel log records
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /cars:
    get:
      operationId: getCars
      tags: [cars]
      summary: Get all cars
      responses:
        "200":
          description: List of cars
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Car"
    post:
      operationId: createCar
      tags: [cars]
      summary: Create a car
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCarInput"
      responses:
        "201":
          description: Created car
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Car"

  /cars/{carId}:
    get:
      operationId: getCar
      tags: [cars]
      summary: Get a car
      parameters:
        - name: carId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Car
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Car"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      operationId: updateCar
      tags: [cars]
      summary: Update a car
      parameters:
        - name: carId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCarInput"
      responses:
        "200":
          description: Updated car
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Car"
    delete:
      operationId: deleteCar
      tags: [cars]
      summary: Delete a car
      parameters:
        - name: carId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /cars/{carId}/maintenance:
    get:
      operationId: getMaintenanceRecords
      tags: [maintenance]
      summary: Get maintenance records for a car
      parameters:
        - name: carId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of maintenance records
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MaintenanceRecord"
    post:
      operationId: createMaintenanceRecord
      tags: [maintenance]
      summary: Create maintenance record
      parameters:
        - name: carId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateMaintenanceInput"
      responses:
        "201":
          description: Created record
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MaintenanceRecord"

  /cars/{carId}/maintenance/{recordId}:
    put:
      operationId: updateMaintenanceRecord
      tags: [maintenance]
      summary: Update maintenance record
      parameters:
        - name: carId
          in: path
          required: true
          schema:
            type: integer
        - name: recordId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateMaintenanceInput"
      responses:
        "200":
          description: Updated record
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MaintenanceRecord"
    delete:
      operationId: deleteMaintenanceRecord
      tags: [maintenance]
      summary: Delete maintenance record
      parameters:
        - name: carId
          in: path
          required: true
          schema:
            type: integer
        - name: recordId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /cars/{carId}/parts:
    get:
      operationId: getPartsRecords
      tags: [parts]
      summary: Get parts records for a car
      parameters:
        - name: carId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of parts records
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PartsRecord"
    post:
      operationId: createPartsRecord
      tags: [parts]
      summary: Create parts record
      parameters:
        - name: carId
          in: path
          required: true
          schema:
            type: integer
      requestBody:

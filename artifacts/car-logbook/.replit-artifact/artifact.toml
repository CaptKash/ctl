kind = "mobile"
previewPath = "/"
title = "Car Logbook"
version = "1.0.0"
id = "artifacts/car-logbook"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
localPort = 22990
name = "expo"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/car-logbook run dev"

[services.env]
PORT = "22990"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/car-logbook", "run", "build"]
run = ["pnpm", "--filter", "@workspace/car-logbook", "run", "serve"]

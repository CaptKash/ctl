name: EAS iOS Build

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build iOS app
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}
          packager: pnpm
          eas-cache: false
          expo-cache: false

      - name: Write Apple API Key
        run: |
          echo "${{ secrets.APPLE_ASC_API_KEY_P8 }}" > artifacts/car-logbook/AuthKey_32329XPJH4.p8

      - name: Build iOS
        working-directory: artifacts/car-logbook
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          APPLE_ASC_API_KEY_PATH: ${{ github.workspace }}/artifacts/car-logbook/AuthKey_32329XPJH4.p8
          APPLE_ASC_API_KEY_ID: ${{ secrets.APPLE_ASC_API_KEY_ID }}
          APPLE_ASC_API_KEY_ISSUER_ID: ${{ secrets.APPLE_ASC_API_KEY_ISSUER_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: eas build --platform ios --profile preview --non-interactive
